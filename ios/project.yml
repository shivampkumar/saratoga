name: Saratoga
options:
  bundleIdPrefix: com.saratoga
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""          # fill in Xcode: Signing & Capabilities
    CODE_SIGN_STYLE: Automatic
packages: {}
targets:
  Saratoga:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - SaratogaApp
    resources:
      - path: SaratogaApp/Resources
        type: folder
    info:
      path: SaratogaApp/Info.plist
      properties:
        CFBundleDisplayName: Saratoga
        NSMicrophoneUsageDescription: Saratoga needs the microphone to transcribe the clinical encounter. Audio never leaves this device.
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
        UILaunchScreen:
          UIColorName: systemBackgroundColor
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.saratoga.app
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: "NO"
    dependencies:
      - framework: ../../cactus/apple/cactus-ios.xcframework
        embed: true
